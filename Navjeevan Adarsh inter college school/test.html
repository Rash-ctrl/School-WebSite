<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Eligibility Quiz</title>
    <link rel="stylesheet" href="test.css">

    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script>
        (function () {
            emailjs.init("eHIf7SEtiFX7o_vsZ");
        })();
    </script>
</head>
<body>
    <div class="container" id="info-form">
      <h1>Navjeevan Adarsh Hr.Sec. School</h1>
        <h2>Student Eligibility Quiz</h2>
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" required />
        </div>
        <div class="form-group">
            <label for="age">Age</label>
            <input type="text" id="age" required />
        </div>
        <div class="form-group">
            <label for="class">Class (1-8)</label>
            <select id="class" required>
                <option value="">Select Class</option>
                <option value="1">Class 1st</option>
                <option value="2">Class 2nd</option>
                <option value="3">Class 3rd</option>
                <option value="4">Class 4th</option>
                <option value="5">Class 5th</option>
                <option value="6">Class 6th</option>
                <option value="7">Class 7th</option>
                <option value="8">Class 8th</option>
            </select>
        </div>
        <div class="form-group">
            <label for="school">School Name</label>
            <input type="text" id="school" required />
        </div>
        <div class="form-group">
    <label for="email">Email Address (optional if phone provided)</label>
    <input type="email" id="email" />
</div>
<div class="form-group">
    <label for="phone">Phone Number (optional if email provided)</label>
    <input type="tel" id="phone" pattern="[0-9]{10}" />
</div>
        <button id="start-btn">Start Quiz</button>
    </div>
    

    <div class="container question-container" id="quiz-container">
        <h2>General Quiz</h2>
        <div class="timer">Time: <span id="time">00:00</span></div>
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div class="question" id="question-container">
            <h3 id="question-text">Question</h3>
            <div class="options" id="options-container"></div>
        </div>
        <button id="next-btn" style="display: none;">Next Question</button>
    </div>

    <div class="container result-container" id="result-container">
        <h2>Quiz Results</h2>
        <div id="student-info"></div>
        <div class="result-score" id="score-display"></div>
        <div id="time-taken"></div>
        <button id="send-results">Send Results to School</button>
        <div id="home">
      <button><a href="index.html" style="text-decoration: none;
            color: #ffffff;">HOME</a></button>
    </div>
        <p id="email-status"></p>
        <div id="incorrect-answers"></div>

    </div>

    <script src="test.js">
        
        </script>
</body>
</html>
